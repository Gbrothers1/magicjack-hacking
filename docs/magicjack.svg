<svg viewBox="0 0 920 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Original illustration of a magicJack HOME: a black box with a blue accent stripe, a USB-A connector, and front RJ45 Ethernet and RJ11 phone jacks with two status LEDs">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f36"/>
      <stop offset="1" stop-color="#0f1114"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>

  <!-- self-contained dark card so it reads on light or dark backgrounds -->
  <rect x="0" y="0" width="920" height="440" rx="18" fill="url(#card)"/>

  <!-- title -->
  <text x="460" y="50" text-anchor="middle" fill="#f8fafc" font-size="29" font-weight="700">magicJack HOME — one box, two computers</text>
  <text x="460" y="78" text-anchor="middle" fill="#94a3b8" font-size="15">a cloud-locked VoIP dongle, reverse-engineered into a self-hosted phone system</text>

  <!-- ===== the device (magicJack HOME) ===== -->
  <g>
    <!-- USB-A plug protruding from the top-right (how this project drives it) -->
    <rect x="556" y="120" width="48" height="58" rx="3" fill="url(#metal)" stroke="#6b7280" stroke-width="1.2"/>
    <rect x="566" y="132" width="28" height="9" rx="2" fill="#334155"/>
    <rect x="566" y="147" width="28" height="9" rx="2" fill="#334155"/>

    <!-- soft shadow -->
    <rect x="292" y="182" width="336" height="170" rx="20" fill="#000" opacity="0.35"/>
    <!-- black enclosure -->
    <rect x="288" y="176" width="336" height="170" rx="20" fill="url(#shell)" stroke="#000" stroke-width="1"/>
    <!-- blue accent stripe (the HOME's signature) -->
    <rect x="298" y="186" width="316" height="150" rx="14" fill="none" stroke="#2ea3ff" stroke-width="4"/>

    <!-- two-brain divider -->
    <line x1="456" y1="198" x2="456" y2="324" stroke="#3b4250" stroke-width="1.5" stroke-dasharray="5 5"/>
    <text x="372" y="230" text-anchor="middle" fill="#e5e7eb" font-size="13" font-weight="700">USB brain</text>
    <text x="372" y="248" text-anchor="middle" fill="#8b95a5" font-size="11">TigerJet + ProSLIC</text>
    <text x="540" y="230" text-anchor="middle" fill="#e5e7eb" font-size="13" font-weight="700">network brain</text>
    <text x="540" y="248" text-anchor="middle" fill="#8b95a5" font-size="11">SoC + Ethernet, SIP</text>

    <!-- status LEDs (green + amber) -->
    <circle cx="326" cy="286" r="5.5" fill="#22c55e"/>
    <circle cx="348" cy="286" r="5.5" fill="#f59e0b"/>

    <!-- front jacks: RJ45 (Ethernet) then RJ11 (phone) -->
    <!-- RJ45 -->
    <rect x="392" y="292" width="64" height="42" rx="4" fill="#0b0d10" stroke="#5b6270" stroke-width="1.4"/>
    <rect x="410" y="286" width="28" height="8" rx="2" fill="#0b0d10" stroke="#5b6270" stroke-width="1.2"/>
    <!-- ethernet glyph (contact pins) -->
    <g stroke="#7c8698" stroke-width="2">
      <line x1="404" y1="304" x2="404" y2="314"/>
      <line x1="412" y1="304" x2="412" y2="314"/>
      <line x1="420" y1="304" x2="420" y2="314"/>
      <line x1="428" y1="304" x2="428" y2="314"/>
      <line x1="436" y1="304" x2="436" y2="314"/>
      <line x1="444" y1="304" x2="444" y2="314"/>
    </g>
    <text x="424" y="330" text-anchor="middle" fill="#7c8698" font-size="9">RJ45</text>

    <!-- RJ11 -->
    <rect x="470" y="296" width="44" height="38" rx="4" fill="#0b0d10" stroke="#5b6270" stroke-width="1.4"/>
    <rect x="483" y="290" width="18" height="8" rx="2" fill="#0b0d10" stroke="#5b6270" stroke-width="1.2"/>
    <!-- phone glyph (handset) -->
    <path d="M481 314 q0 -8 8 -8 l3 0 q3 0 4 3 l1 3 q1 3 -1 4 l-2 2 q3 5 8 8 l2 -2 q2 -2 4 -1 l3 1 q3 1 3 4 l0 3 q0 8 -8 8 q-16 -2 -25 -12 q-4 -6 -4 -14 z" fill="#7c8698"/>
    <text x="492" y="330" text-anchor="middle" fill="#7c8698" font-size="9">RJ11</text>
  </g>

  <!-- ===== callouts ===== -->
  <!-- USB / the hack -->
  <line x1="580" y1="120" x2="672" y2="150" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="580" cy="122" r="3" fill="#ef4444"/>
  <text x="682" y="140" fill="#ef4444" font-size="14" font-weight="700">USB — the hack</text>
  <text x="682" y="158" fill="#cbd5e1" font-size="12">driven straight from Linux,</text>
  <text x="682" y="174" fill="#cbd5e1" font-size="12">no vendor app or cloud</text>

  <!-- RJ45 / SIP -->
  <line x1="424" y1="292" x2="360" y2="392" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="424" cy="292" r="3" fill="#a78bfa"/>
  <text x="352" y="384" text-anchor="end" fill="#a78bfa" font-size="14" font-weight="700">Ethernet / SIP</text>
  <text x="352" y="402" text-anchor="end" fill="#cbd5e1" font-size="12">captured &amp; re-pointed at a</text>
  <text x="352" y="418" text-anchor="end" fill="#cbd5e1" font-size="12">self-hosted Asterisk</text>

  <!-- RJ11 / phone -->
  <line x1="492" y1="334" x2="560" y2="392" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="492" cy="334" r="3" fill="#38bdf8"/>
  <text x="570" y="384" fill="#38bdf8" font-size="14" font-weight="700">RJ11</text>
  <text x="570" y="402" fill="#cbd5e1" font-size="12">an ordinary analog phone —</text>
  <text x="570" y="418" fill="#cbd5e1" font-size="12">now a real PBX extension</text>

  <!-- neutral label + capability badge (no logo/wordmark) -->
  <text x="456" y="366" text-anchor="middle" fill="#64748b" font-size="12" font-style="italic">magicJack HOME (illustration)</text>
</svg>
