# /etc/asound.conf — MagicJack USB FXS (TigerJet, ALSA card 1) for chan_console.
#
# chan_console opens 16 kHz duplex; the TigerJet is 8 kHz capture / 8k-16k play.
# Direct/plug duplex XRUNs under load, so use dmix (playback) + dsnoop (capture)
# at the native 8 kHz with LARGE buffers for timing slack, wrapped in plug so
# chan_console's 16 kHz resamples cleanly, and asym to join the two directions.
# Only ADDS named devices; leaves the system default (card 0) untouched.

pcm.tjfxs_dmix {
    type dmix
    ipc_key 3001
    slave { pcm "hw:1,0"; rate 8000; channels 1; period_size 320; buffer_size 3840 }
}
pcm.tjfxs_dsnoop {
    type dsnoop
    ipc_key 3002
    slave { pcm "hw:1,0"; rate 8000; channels 1; period_size 320; buffer_size 3840 }
}
pcm.tjfxs {
    type asym
    playback.pcm { type plug; slave.pcm "tjfxs_dmix" }
    capture.pcm  { type plug; slave.pcm "tjfxs_dsnoop" }
    hint {
        show on
        description "TigerJet MagicJack FXS duplex"
    }
}
ctl.tjfxs { type hw; card 1 }
