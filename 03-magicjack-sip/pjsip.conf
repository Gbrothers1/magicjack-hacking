;=====================================================================
; Self-hosted SIP server for the MagicJack ATA  (pjsip.conf)
; ATA facts: user EXXXXXXXXXXXX @ talk4free.com, UDP 5070, NO auth, G.711
; See ../02-cisco-1841/magicjack-sip-notes.md for the captured protocol.
;=====================================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5070
; --- If you get one-way audio on PSTN calls, uncomment + set your public IP: ---
;external_media_address=YOUR.PUBLIC.IP
;external_signaling_address=YOUR.PUBLIC.IP
;local_net=<server-subnet>/24
;local_net=<lan-subnet>/24

;---------------------------------------------------------------------
; The MagicJack ATA — NO AUTHENTICATION (matches captured behavior).
; Matched by source IP because the ATA sends no credentials.
; With the OpenWrt DNAT+MASQUERADE redirect (cutover.sh), Asterisk sees
; the ATA's SIP arriving FROM the OpenWrt LAN IP <gw-ip>.
;---------------------------------------------------------------------
[EXXXXXXXXXXXX]
type=endpoint
transport=transport-udp
context=from-magicjack
disallow=all
allow=ulaw,alaw
aors=EXXXXXXXXXXXX
mailboxes=200@default
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733

[EXXXXXXXXXXXX]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

[EXXXXXXXXXXXX]
type=identify
endpoint=EXXXXXXXXXXXX
match=<gw-ip>        ; OpenWrt LAN IP (post-DNAT/masquerade source)
;match=<router-wan-ip>     ; <- use this instead if you redirect WITHOUT masquerade

;=====================================================================
; magicJack USB FXS handset — a baresip softphone running ON THIS host,
; native 8 kHz ulaw over the TigerJet (ALSA card 1). This is the reversed
; USB personality (see 06-magicjack-usb-tigerjet/). ext 200 dials PJSIP/mjusb;
; line power / hook / ring / DTMF are driven by mj-fxs-bridge.py (tj_linepower.py)
; which controls baresip over ctrl_tcp. Registers to 127.0.0.1:5070 as "mjusb".
;=====================================================================
[mjusb]
type=endpoint
transport=transport-udp
context=from-magicjack
disallow=all
allow=ulaw,alaw
auth=mjusb-auth
aors=mjusb
mailboxes=200@default
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733

[mjusb-auth]
type=auth
auth_type=userpass
username=mjusb
password=CHANGEME_MJUSB_PASSWORD

[mjusb]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

;=====================================================================
; VoIP.ms trunk  ***  FILL IN THE CHANGEME VALUES FROM YOUR PORTAL  ***
;   server host : your POP, e.g. sanjose.voip.ms / newyork.voip.ms
;   username    : main or sub-account (e.g. 123456_ata)
;   password    : sub-account SIP password
;   (buy a DID and set MYDID in extensions.conf too)
;=====================================================================
[voipms-reg]
type=registration
transport=transport-udp
outbound_auth=voipms-auth
server_uri=sip:losangeles1.voip.ms
client_uri=sip:YOUR_VOIPMS_SUBACCOUNT@losangeles1.voip.ms
retry_interval=60
forbidden_retry_interval=300
expiration=3600

[voipms-auth]
type=auth
auth_type=userpass
username=YOUR_VOIPMS_SUBACCOUNT
password=CHANGEME_SIP_PASSWORD

[voipms]
type=aor
contact=sip:losangeles1.voip.ms

[voipms]
type=endpoint
transport=transport-udp
context=from-pstn
disallow=all
allow=ulaw,alaw
outbound_auth=voipms-auth
aors=voipms
from_user=YOUR_VOIPMS_SUBACCOUNT
from_domain=losangeles1.voip.ms
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733

[voipms]
type=identify
endpoint=voipms
match=208.100.60.35

;=====================================================================
; macOS softphone over TAILSCALE.
; Dedicated transport bound to the Tailscale IP so Asterisk advertises the
; Tailscale address for BOTH signaling and media (no one-way audio).
; The Mac registers to  YOUR.TAILSCALE.IP:5062  as user 6001.
;=====================================================================
[transport-ts]
type=transport
protocol=udp
bind=YOUR.TAILSCALE.IP:5062

[6001]
type=endpoint
transport=transport-ts
context=from-magicjack
disallow=all
allow=ulaw,alaw
auth=6001-auth
aors=6001
mailboxes=6001@default
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733

[6001-auth]
type=auth
auth_type=userpass
username=6001
password=CHANGEME_6001_PASSWORD

[6001]
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

; === Steam Deck HFP->cellular bridge endpoint (added by Claude) ===
[steamdeck]
type=endpoint
transport=transport-ts
context=from-magicjack
disallow=all
allow=ulaw,alaw
auth=steamdeck-auth
aors=steamdeck
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
dtmf_mode=rfc4733

[steamdeck-auth]
type=auth
auth_type=userpass
username=steamdeck
password=CHANGEME_STEAMDECK_PASSWORD

[steamdeck]
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30


;===== Twilio Elastic SIP Trunking (termination / outbound) =====
[twilio-auth]
type=auth
auth_type=userpass
realm=sip.twilio.com
username=YOUR_TWILIO_USERNAME
password=CHANGEME_SIP_PASSWORD

[twilio-aor]
type=aor
contact=sip:YOURTRUNK.pstn.YOURREGION.twilio.com

[twilio]
type=endpoint
transport=transport-udp
context=from-pstn
disallow=all
allow=ulaw
outbound_auth=twilio-auth
aors=twilio-aor
from_domain=YOURTRUNK.pstn.YOURREGION.twilio.com
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no

