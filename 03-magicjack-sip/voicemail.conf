;=====================================================================
; Voicemail for the MagicJack PBX  (voicemail.conf)
; Retrieve with *97 from any registered phone.
; mailbox => PIN,Full Name,email[,pager][,options]
;=====================================================================
[general]
format=wav49|gsm|wav          ; store as these; wav49 emails small
attach=yes                    ; attach the recording to the email
maxmsg=100
maxsecs=300                   ; 5 min max message
minsecs=2
skipms=3000
maxsilence=10
silencethreshold=128
sendvoicemail=yes
; --- voicemail-to-email: set an SMTP relay in Asterisk to enable ---
serveremail=pbx@pbx-host
emailsubject=[Voicemail] ${VM_MAILBOX}: msg ${VM_MSGNUM} from ${VM_CALLERID} (${VM_DUR})
emailbody=New ${VM_DUR} voicemail in mailbox ${VM_MAILBOX} from ${VM_CALLERID} on ${VM_DATE}.
fromstring=MagicJack PBX
mailcmd=/usr/sbin/sendmail -t

[default]
; mailbox 200 = the shop phone (the MagicJack ATA). Change PIN + email.
200 => 1234,Shop Phone,you@example.com
; mailbox 6001 = the softphone
6001 => 1234,Softphone,you@example.com
; mailbox thomas = Thomas's softphone (change PIN via *97)
thomas => 1234,Thomas
