;=====================================================================
; MagicJack SIP PBX dialplan (extensions.conf) - rebuilt 2026-07-14
; Auto-attendant + GoSub subroutines. All legacy numbers still dial
; directly; dial 0 for the voice menu (# is unreliable on softphones).
;=====================================================================
[globals]
MYDID=1XXXXXXXXXX
BBSHOST=127.0.0.1
BBSPORT=2323
ICE=http://127.0.0.1:8000

;=====================================================================
; REUSABLE SUBROUTINES (collapse the old copy-paste blocks)
;=====================================================================
; Play an Icecast/HTTP MP3 stream:  Gosub(sub-stream,s,1(<url>,<label>))
[sub-stream]
exten => s,1,NoOp(Stream: ${ARG2})
 same => n,Answer()
 same => n,Wait(1)
 same => n,MP3Player(${ARG1})
 same => n,Return()

; Ring an endpoint, fall back to voicemail:  Gosub(sub-dialvm,s,1(<ep>,<mbox>))
[sub-dialvm]
exten => s,1,Dial(PJSIP/${ARG1},20)
 same => n,VoiceMail(${ARG2}@default,u)
 same => n,Return()

; Answer a dial-up modem for the BBS:  Gosub(sub-bbs,s,1(<modulation>[,<extra softmodem opts>]))
; ARG2 = optional extra Softmodem opts appended after "l" (e.g. t(-12)r(-45) to
; drive a low-output FXS like the USB TigerJet SLIC); empty for the network ATA path.
[sub-bbs]
exten => s,1,NoOp(BBS softmodem ${ARG1} opts=${ARG2})
 same => n,Answer()
 same => n,Softmodem(${BBSHOST},${BBSPORT},v(${ARG1})l${ARG2})
 same => n,Wait(3)
 same => n,Return()

;=====================================================================
; MAIN - dialed by registered phones (MagicJack, 6001, steamdeck, thomas)
;=====================================================================
[from-magicjack]
; ---- Voice menu (dial 0; # included but softphones usually can't send it) ----
exten => 0,1,Goto(ivr-main,s,1)
exten => #,1,Goto(ivr-main,s,1)

; ---- Scanners (Elko County) ----
exten => 89801,1,Gosub(sub-stream,s,1(http://broadcastify.cdnstream1.com/8543,Broadcastify 8543))
 same => n,Hangup()
exten => 89802,1,Gosub(sub-stream,s,1(${ICE}/elko-county.mp3,SDR Multi-Dispatch 155.055))
 same => n,Hangup()
exten => 89803,1,Gosub(sub-stream,s,1(${ICE}/elko-so-tac.mp3,SDR SO Tac 154.025))
 same => n,Hangup()
exten => 89804,1,Gosub(sub-stream,s,1(${ICE}/elko-so-car.mp3,SDR SO Car-to-Car 153.740))
 same => n,Hangup()
; 89805 = NOAA WX WXL28 162.550 - live once a 2nd RTL-SDR feeds elko-noaa.mp3;
; until then MP3Player returns at once and we play the "unavailable" notice.
exten => 89805,1,NoOp(NOAA WX WXL28 162.550 -- needs 2nd dongle)
 same => n,Answer()
 same => n,Wait(1)
 same => n,MP3Player(${ICE}/elko-noaa.mp3)
 same => n,Playback(custom/noaa-unavailable)
 same => n,Hangup()

; ---- People / voicemail ----
; ext 200 = the magicJack line. Now the reverse-engineered USB-FXS handset:
; a baresip softphone (endpoint mjusb, native 8kHz over ALSA card 1) driven by
; the mj-fxs-bridge daemon for physical dial tone / ring / hook / DTMF. Falls back
; to the network ATA endpoint + voicemail if the USB handset doesn't answer in 25s.
; (Old behaviour preserved below as 2000 for rollback / A-B testing.)
exten => 200,1,NoOp(Ring USB magicJack FXS handset -> baresip endpoint mjusb)
 same => n,Dial(PJSIP/mjusb,25)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n,Gosub(sub-dialvm,s,1(EXXXXXXXXXXXX,200))
 same => n(done),Hangup()
exten => 2000,1,Gosub(sub-dialvm,s,1(EXXXXXXXXXXXX,200))
 same => n,Hangup()
exten => 201,1,Gosub(sub-dialvm,s,1(6001,6001))
 same => n,Hangup()
exten => 202,1,Gosub(sub-dialvm,s,1(steamdeck,6001))
 same => n,Hangup()
exten => 203,1,Gosub(sub-dialvm,s,1(thomas,thomas))
 same => n,Hangup()
exten => *97,1,VoiceMailMain(@default)
 same => n,Hangup()

; ---- Test / media ----
exten => 100,1,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Playback(demo-echodone)
 same => n,Hangup()
exten => 101,1,Answer()
 same => n,Milliwatt()
exten => 102,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Hangup()

; ---- Dial-up BBS (standard modulations via subroutine) ----
; TigerJet USB FXS station needs the same -12 dBi TX boost as 503 (its SLIC is quiet).
exten => 500,1,Gosub(sub-bbs,s,1(V22bis,t(-12)r(-45)))
 same => n,Hangup()
exten => 501,1,Gosub(sub-bbs,s,1(V22,t(-12)r(-45)))
 same => n,Hangup()
exten => 502,1,Gosub(sub-bbs,s,1(V23,t(-12)r(-45)))
 same => n,Hangup()
; 503 driven from the USB TigerJet FXS station (mjusb): its SLIC attenuates ~16 dB+
; more than the network ATA, so bump TX to -12 dBi + sensitive -45 RX cutoff or the
; answering carrier lands below the caller modem's carrier-detect threshold.
exten => 503,1,Gosub(sub-bbs,s,1(Bell103,t(-12)r(-45)))
 same => n,Hangup()
exten => 504,1,Gosub(sub-bbs,s,1(V21,t(-12)r(-45)))
 same => n,Hangup()
exten => 507,1,Gosub(sub-bbs,s,1(Bell202,t(-12)r(-45)))
 same => n,Hangup()
; tuned experiments kept explicit (extra TX/EC params)
exten => 505,1,Answer()
 same => n,Softmodem(127.0.0.1,2323,v(Bell103)lt(-12)r(-45))
 same => n,Wait(3)
 same => n,Hangup()
exten => 506,1,Answer()
 same => n,Softmodem(127.0.0.1,2323,v(Bell103)lt(-6)r(-45))
 same => n,Wait(3)
 same => n,Hangup()
exten => 509,1,Answer()
 same => n,Softmodem(127.0.0.1,2323,v(V22bis)lt(-15)r(-22)a(800)c(45))
 same => n,Wait(3)
 same => n,Hangup()
; ---- EC re-tune sweep for reliable 2400 over the TigerJet FXS ----
; TigerJet echo delay measured at 53.5 ms; single-talk window only ~860 ms, so
; converge faster: exact delay seed + shorter FIR tail. ANSam trimmed/dropped since
; the bare SLIC has no voice-mode EC to disable (long ANSam destabilised handshake).
exten => 510,1,Answer()   ; exact delay + short tail (128 taps)
 same => n,Softmodem(127.0.0.1,2323,v(V22bis)lt(-15)r(-22)a(800)c(53:16))
 same => n,Wait(3)
 same => n,Hangup()
exten => 511,1,Answer()   ; short ANSam + short tail
 same => n,Softmodem(127.0.0.1,2323,v(V22bis)lt(-15)r(-22)a(400)c(53:16))
 same => n,Wait(3)
 same => n,Hangup()
exten => 512,1,Answer()   ; louder + sensitive RX + short ANSam + short tail
 same => n,Softmodem(127.0.0.1,2323,v(V22bis)lt(-12)r(-30)a(400)c(53:16))
 same => n,Wait(3)
 same => n,Hangup()
exten => 513,1,Answer()   ; no ANSam, seed delay, short tail
 same => n,Softmodem(127.0.0.1,2323,v(V22bis)lt(-12)r(-30)c(53:16))
 same => n,Wait(3)
 same => n,Hangup()
exten => 514,1,Answer()   ; very short tail (64 taps) for fastest convergence
 same => n,Softmodem(127.0.0.1,2323,v(V22bis)lt(-15)r(-22)a(600)c(53:8))
 same => n,Wait(3)
 same => n,Hangup()
; 508 = listen-in on the MagicJack line (ChanSpy)
exten => 508,1,Answer()
 same => n(spy),ChanSpy(PJSIP/EXXXXXXXXXXXX,qS)
 same => n,Wait(1)
 same => n,Goto(spy)

; ---- Outbound PSTN via Steam Deck cellular (oFono HFP) ----
exten => _1NXXNXXXXXX,1,NoOp(Cell-out ${EXTEN})
 same => n,Set(CHANNEL(hangup_handler_push)=cell-hangup-sub,s,1)
 same => n,System(/usr/local/bin/cell-dial.sh ${EXTEN})
 same => n,Wait(2)
 same => n,Dial(PJSIP/steamdeck,120)
 same => n,System(/usr/local/bin/cell-hangup.sh)
 same => n,Hangup()
exten => _NXXNXXXXXX,1,Goto(1${EXTEN},1)
; 911 (E911 must be provisioned at VoIP.ms first!)
exten => 911,1,Set(CALLERID(num)=${MYDID})
 same => n,Dial(PJSIP/911@voipms,60)
 same => n,Hangup()

;=====================================================================
; IVR AUTO-ATTENDANT
;=====================================================================
[ivr-main]
exten => s,1,Answer()
 same => n,Set(TIMEOUT(digit)=4)
 same => n,Set(TIMEOUT(response)=10)
 same => n(top),Background(custom/menu-main)
 same => n,WaitExten(10)
exten => 1,1,Goto(ivr-scanners,s,1)
exten => 2,1,Goto(ivr-people,s,1)
exten => 3,1,Goto(ivr-bbs,s,1)
exten => 4,1,Goto(from-magicjack,89805,1)
exten => 9,1,Goto(from-magicjack,100,1)
exten => 0,1,Gosub(sub-dialvm,s,1(EXXXXXXXXXXXX,200))
 same => n,Hangup()
exten => i,1,Playback(pbx-invalid)
 same => n,Goto(s,top)
exten => t,1,Goto(from-magicjack,200,1)
exten => *,1,Goto(s,top)

[ivr-scanners]
exten => s,1,Answer()
 same => n(top),Background(custom/menu-scanners)
 same => n,WaitExten(10)
exten => 1,1,Goto(from-magicjack,89802,1)
exten => 2,1,Goto(from-magicjack,89803,1)
exten => 3,1,Goto(from-magicjack,89804,1)
exten => 4,1,Goto(from-magicjack,89801,1)
exten => 5,1,Goto(from-magicjack,89805,1)
exten => 0,1,Goto(ivr-main,s,1)
exten => i,1,Goto(s,top)
exten => t,1,Goto(ivr-main,s,1)

[ivr-people]
exten => s,1,Answer()
 same => n(top),Background(custom/menu-people)
 same => n,WaitExten(10)
exten => 1,1,Goto(from-magicjack,200,1)
exten => 2,1,Goto(from-magicjack,201,1)
exten => 3,1,Goto(from-magicjack,203,1)
exten => 0,1,Goto(ivr-main,s,1)
exten => i,1,Goto(s,top)
exten => t,1,Goto(ivr-main,s,1)

[ivr-bbs]
exten => s,1,Answer()
 same => n(top),Background(custom/menu-bbs)
 same => n,WaitExten(10)
exten => 1,1,Goto(from-magicjack,500,1)
exten => 2,1,Goto(from-magicjack,501,1)
exten => 3,1,Goto(from-magicjack,503,1)
exten => 0,1,Goto(ivr-main,s,1)
exten => i,1,Goto(s,top)
exten => t,1,Goto(ivr-main,s,1)

;=====================================================================
; magicJack USB (TigerJet) FXS via chan_console  — added 2026-07-15
; Audio = Console/magicjack (ALSA card 1). Line power / hook / ring / DTMF are
; handled out-of-band by the mj-fxs-bridge.py daemon (uses tj_linepower.py).
; Off-hook originations from the handset are placed by the daemon as
;   Console/magicjack -> <dialed digits>@from-magicjack
; so the handset can reach everything a SIP phone can.
;=====================================================================
[magicjack-fxs]
include => from-magicjack
; Bare console origination with no target (manual `console dial` with no exten)
exten => s,1,NoOp(magicjack-fxs console idle)
 same => n,Answer()
 same => n,Playback(silence/1)
 same => n,Hangup()

;=====================================================================
; INBOUND FROM PSTN (VoIP.ms DID) -> auto-attendant
;=====================================================================
[from-pstn]
exten => _X.,1,NoOp(PSTN in: ${EXTEN})
 same => n,Goto(ivr-main,s,1)

;=====================================================================
; CELL glue (+ Thomas added to the inbound ring group)
;=====================================================================
[cell-hangup-sub]
exten => s,1,System(/usr/local/bin/cell-hangup.sh)
 same => n,Return()

[cell-inbound]
exten => grpring,1,Dial(PJSIP/6001&PJSIP/EXXXXXXXXXXXX&PJSIP/thomas,30)
 same => n,Hangup()
exten => bridgecell,1,System(/usr/local/bin/cell-answer.sh)
 same => n,Dial(PJSIP/steamdeck,60)
 same => n,Hangup()
