;=====================================================================
; console.conf — chan_console bridge for the magicJack USB (TigerJet) FXS port
;
; Debian's Asterisk 20 does not ship chan_alsa; chan_console is its supported
; successor (PortAudio-based) and does the same job: presents the TigerJet USB
; sound card (ALSA card 1 / PortAudio "USB Internet Phone by TigerJet") as an
; Asterisk console channel carrying two-way audio to/from the attached handset.
;
; Line power, hook detection, ring and DTMF are handled OUT of band by the
; glue daemon mj-fxs-bridge.py (using tools/tj_linepower.py), because chan_console
; only does audio — it has no concept of an FXS loop/ring. See that daemon +
; the [magicjack-fxs] dialplan context in extensions.conf.
;=====================================================================
[general]
; nothing global needed

[magicjack]
; Use the 'tjfxs' plug PCM from /etc/asound.conf (NOT the raw hw device): chan_console
; opens a 16 kHz duplex stream, but the TigerJet capture is 8 kHz only, so the raw
; hw:1,0 device fails with "invalid sample rate". The plug PCM resamples 16k<->8k.
input_device  = tjfxs
output_device = tjfxs
; The daemon answers/originates explicitly, so do NOT auto-answer inbound.
autoanswer = no
; Make this the active console device (so `console dial` uses the TigerJet).
active = yes
; Where an off-hook (originated) call enters the dialplan:
context   = magicjack-fxs
extension = s
callerid  = MagicJack USB <200>
language  = en
